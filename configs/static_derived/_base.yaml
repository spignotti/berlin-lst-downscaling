# @package _global_
# Pipeline B: derived geometry products — base config.

mode: full

# Source products root — finalized Pipeline A output (local or GCS).
# Overridden in leaf configs.
source_root: "data/static/sources/smoke"

# Derived product root — overridden in leaf configs.
derived_root: "data/static/derived/smoke"

# Frozen geometry ID for downstream lineage.
geometry_id: "dgm1-2021__lod2-2024__vh-2020"

# Required upstream sources (source/revision pairs).
upstream:
  terrain_height: "2021"
  vegetation_height: "2020"
  lod2_morphology: "2024"

# SVF / horizon parameters
svf_max_radius: 3
svf_n_directions: 16
horizon_max_radius_m: 200

# Hydra overrides
hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false
