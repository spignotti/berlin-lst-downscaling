# @package _global_
# Base config for dynamic scene pipeline.

# Manifest URI — REQUIRED. Published v3 manifest bundle.
# Override on command line: manifest_uri=gs://berlin-lst-data/manifests/v3/...
manifest_uri: null

# Static product roots (source + derived geometry)
source_root: "data/static/sources/smoke"
derived_root: "data/static/derived/smoke"
output_root: "data/dynamic"

# Geometry ID — must match static derived geometry
geometry_id: "dgm1-2021__lod2-2024__vh-2020"

# Temporal policy
geometry_temporal_mode: "retrospective_static"

# Optional: restrict to specific scene IDs (empty = all anchors)
scene_ids: []

# Dataset role — full retrospective run emits `anchor`, the 2026 inference
# run overrides this to `inference`.
dataset_role: anchor

# Logging
logging_level: INFO

# Hydra overrides
hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false
