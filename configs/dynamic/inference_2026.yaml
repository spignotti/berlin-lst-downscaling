# Inference run — 21 Landsat anchors from 2026.
# All products are marked role=inference; excluded from training/validation/test.
# Invoke on the VM with the canonical manifest bundle.
#   manifest_uri=gs://berlin-lst-data/manifests/v3/...-r2/manifest.parquet
years: [2026]
dataset_role: inference
expected_scene_count: 21
source_root: "gs://berlin-lst-data/static/sources/full"
derived_root: "gs://berlin-lst-data/static/derived/full"
output_root: "gs://berlin-lst-data/dynamic/inference/2026"
