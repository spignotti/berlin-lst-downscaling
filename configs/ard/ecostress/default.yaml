# @package _global_
# Extends configs/ard/_base.yaml which provides all shared defaults.
defaults:
  - ../_base
  - _self_

sources: ["ecostress"]
output_root: "data/ard/ecostress"
target_resolution_low: 70          # ECOSTRESS L2T native 70 m
ecostress:
  enabled: true
  raw_dir: "data/ecostress/raw"    # full-mode: AppEEARS-exported L2T COGs
  persist_stage: false             # clean up stage dir after processing
