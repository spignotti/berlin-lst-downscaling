# @package _global_
# Shared ARD pipeline configuration.
# Used by gee_export.yaml and individual source configs.

ard:
  crs: "EPSG:25833"

  # Berlin + 2 km buffer, fetched from Geoportal Berlin WFS.
  aoi:
    wgs84_bbox: [13.0471, 52.3122, 13.7937, 52.6970]
    aoi_25833: [368002.320, 5797523.137, 417784.933, 5839258.933]

  # Target grid: 10 m with nested 100 m (exact 10×10 aggregate, same origin).
  grid:
    origin_x: 368000
    origin_y: 5839000
    resolution_10m: 10.0
    resolution_100m: 100.0

  time:
    start_year: 2017
    end_year: 2025
    months: [5, 6, 7, 8, 9]

  output:
    bucket: "berlin-lst-data"
    raw_prefix: "raw"           # Phase 1: GEE exports (temporary)
    ard_prefix: "ard"           # Phase 1: Final ARD COGs
    cog:                        # Phase 1: COG write parameters
      tile_size: 512
      overview_levels: 2        # number of overview levels (-1 = auto, 0 = none)
      overview_resampling: "BILINEAR"
      nodata: "nan"
      dtype: "float32"
      compression: "ZSTD"
    stac:                        # Phase 3: STAC metadata
      processing_version: "0.1.0"

  gee:
    project: "masterarbeit-berlin-lst-v2"
    service_account_email: "masterarbeit-vertex@masterarbeit-berlin-lst-v2.iam.gserviceaccount.com"
    service_account_key_path: "${oc.env:GOOGLE_APPLICATION_CREDENTIALS}"
    max_pixels: 10000000000000  # 1e13
    task_poll_interval_sec: 30
    task_timeout_min: 1440          # 24h max wait for GEE exports
    logging_tag: "ard-pipeline"
