# @package _global_
# Shared base config for all ARD pipelines.
# Each source-specific config extends this via Hydra defaults.

mode: full

# Acquisition
scene_date: null                    # ISO date string (smoke overrides with specific date)
bbox: [13.08, 52.34, 13.76, 52.68] # WGS84 Berlin bbox
target_crs: "EPSG:25833"
target_resolution_low: 100          # Landsat LST native; ECOSTRESS uses 70m (overridden per source)
target_resolution_high: 10          # S2 and other bands

# Cloud masking
cloud_dilation_px: 2              # morphological dilation radius for cloud buffer

# Cloud-shadow projection (S2 directional offset)
cloud_base_height_m: 1000          # assumed cloud base height for shadow offset

# Attempt ceiling — scenes exceeding this many attempts become exhausted
max_scene_attempts: 3

# ECOSTRESS (disabled in default; enabled per ecostress source config)
ecostress:
  raw_dir: "data/ecostress/raw"    # full-mode: AppEEARS-exported L2T COGs
  stage_base: "data/smoke/ecostress_stage"  # manifest-driven staging root (local), overridden to gs:// for cloud

# Output
manifest_uri: null                  # explicit manifest path (or resolved from output_root)
output_root: "data/ard"            # source-specific subdirectory set per source config

# Logging
logging_level: INFO                 # DEBUG, INFO, WARNING, ERROR

# AOI (Berlin boundary)
aoi:
  mask_base: "data/boundaries"     # base path for aoi_10m.tif and aoi_100m.tif
  min_overlap_px: 50               # warn if COG∩AOI < this many pixels (catches off-target swaths)

# Hydra overrides (suppress run dir and cwd changes)
hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false
