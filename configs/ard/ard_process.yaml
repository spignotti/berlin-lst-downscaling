# @package _global_

# ARD processing configuration — reproject/regrid GEE and AppEEARS exports
# to the canonical EPSG:25833 grid with QA validation.
#
# Usage:
#   uv run python scripts/ard_process.py --dry-run
#   uv run python scripts/ard_process.py source=landsat year=2023
#   uv run python scripts/ard_process.py source=landsat year=2023 dry_run=false

defaults:
  - default
  - landsat
  - sentinel2
  - ecostress
  - _self_

mode: null                 # "plan" | "smoke" | "all" — drives dry_run + smoke (preferred)
year: null                 # null = all years, or e.g. year=2023
source: null               # null = all sources, or "landsat" / "sentinel2" / "ecostress"
dry_run: true              # default safe — shows what would be processed (overridden by mode)
smoke: false               # process only 1 scene per source (overridden by mode)

ard:
  process:
    temp_dir: "data/tmp/ard_process"
    resampling: "bilinear"
    resume: true              # skip already-processed scenes by reading GCS manifest
    max_workers: 4            # parallel scene processing; 4 workers → ~2 GB peak for S2

    sources:
      landsat:
        gcs_prefix: "ard/dynamic/landsat"
        output_prefix: "ard/processed/landsat"
        target_resolution: 100
      sentinel2:
        gcs_prefix: "ard/dynamic/sentinel2"
        output_prefix: "ard/processed/sentinel2"
        target_resolution: 10
      ecostress:
        gcs_prefix: "ard/validation/ecostress"
        output_prefix: "ard/processed/ecostress"
        target_resolution: null   # keep native ~70m, no regrid

    qa:
      nodata_threshold: 0.95
      min_aoi_coverage: 0.80
      strict_qa: false
      quicklook: false

# ── Hydra overrides to keep scripts in-place ─────────────────────────────
hydra:
  run:
    dir: .
  output_subdir: null
