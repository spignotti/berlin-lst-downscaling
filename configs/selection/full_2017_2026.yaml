# @package _global_
# Full volume scan: May–Sep 2017–2025 complete + 2026 through cutoff.
# Writes manifest.parquet + pairings.parquet + manifest_report.json.
defaults:
  - default
  - _self_

mode: couple
years: [2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
months: [5, 6, 7, 8, 9]
cutoff_utc: "2026-07-17T23:59:59Z"

# Local-only target. Always copy the bundle to an immutable bundle prefix
# (eg gs://berlin-lst-data/manifests/v3/...-r2/) via scripts/publish_manifest.py
# before any pipeline reads it.
output_root: "data/manifest_build/v3/2017-2026-cutoff-20260717T235959Z"
checkpoint_dir: "data/manifest_build/v3/2017-2026-cutoff-20260717T235959Z/checkpoints"
