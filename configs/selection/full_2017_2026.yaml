# @package _global_
# Full volume scan: May–Sep 2017–2025 complete + 2026 through cutoff.
# Writes manifest.parquet + pairings.parquet + manifest_report.json.
defaults:
  - default
  - _self_

mode: couple
years: [2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
months: [5, 6, 7, 8, 9]
# cutoff_utc must be provided at runtime: years 2017-2025 are complete;
# 2026 acquisitions are included only up to this instant.
# Example: cutoff_utc=2026-07-17T23:59:59Z
cutoff_utc: null
