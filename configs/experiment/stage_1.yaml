# @package _global_

# Stage 1: Spectral indices only (baseline)
# Predictors: NDVI, NDBI, NDWI, MNDWI

defaults:
  - override /datamodule: berlin

tags: ["stage_1", "spectral_only"]

module:
  network:
    model:
      in_channels: 5

datamodule:
  feature_set:
    - lst
    - ndvi
    - ndbi
    - ndwi
    - mndwi
