# @package _global_

# Stage 5: Full model — all feature groups combined
# Spectral + morphology + shadow/solar + meteorology

defaults:
  - override /datamodule: berlin

tags: ["stage_5", "full"]

module:
  network:
    model:
      in_channels: 16

datamodule:
  feature_set:
    - lst
    - ndvi
    - ndbi
    - ndwi
    - mndwi
    - dem
    - slope
    - aspect
    - building_height
    - hillshade
    - sky_view_factor
    - solar_azimuth
    - solar_elevation
    - air_temperature
    - humidity
    - wind_speed
