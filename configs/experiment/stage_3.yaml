# @package _global_

# Stage 3: Spectral + morphology + shadow/solar geometry
# Adds: hillshade, sky view factor, solar azimuth, solar elevation

defaults:
  - override /datamodule: berlin

tags: ["stage_3", "shadow_solar"]

module:
  network:
    model:
      in_channels: 13

datamodule:
  feature_set:
    - lst
    - ndvi
    - ndbi
    - ndwi
    - mndwi
    - dem
    - slope
    - aspect
    - building_height
    - hillshade
    - sky_view_factor
    - solar_azimuth
    - solar_elevation
