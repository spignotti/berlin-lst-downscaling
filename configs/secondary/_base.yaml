# @package _global_
# Shared base config for all secondary-data pipelines.

mode: full                    # fixture | cloud_smoke | full

# Canonical CRS and grid (derived from common/grid.py)
target_crs: "EPSG:25833"
target_resolution: 10

# Output
output_root: "data/secondary"  # gs://… for cloud smoke or full runs

# Ledger
ledger_name: "ledger.parquet"

# Disk budget (peak scratch, GiB)
peak_scratch_gb: 4

# Hydra overrides (suppress run dir and cwd changes)
hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false
