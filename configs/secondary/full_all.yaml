defaults:
  - _base
  - _self_

# Full run — every configured source against the production bucket root.
# Invoke on the VM with output_root override, e.g.
#     uv run python scripts/run_secondary.py --config-name full_all \
#         output_root=gs://berlin-lst-data/secondary/full
#
# NOTE: do not set a shared ``vintages`` key here — the adapters use
# their own defaults (imperviousness: 2016, 2021; vegetation_height: 2020).
mode: full
sources: [imperviousness, vegetation_height]
peak_scratch_gb: 4
